<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Shopsy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

    /* Navbar */
    nav {
      background: #111;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo { color: white; font-size: 22px; font-weight: bold; }
    nav ul { list-style: none; display: flex; gap: 25px; }
    nav ul li a { color: white; text-decoration: none; font-size: 15px; }
    nav ul li a:hover { text-decoration: underline; }

    /* Contact Section */
    .contact-container {
      max-width: 550px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; margin-bottom: 30px; font-size: 28px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }
    input:focus, textarea:focus { border-color: #111; }
    textarea { height: 130px; resize: vertical; }

    button {
      width: 100%;
      padding: 13px;
      background: #111;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #333; }

    .info { text-align: center; margin-top: 25px; color: #555; line-height: 2; }

    /* Footer */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">SHOPSY</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Contact Form -->
  <div class="contact-container">
    <h1>Contact Us</h1>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" placeholder="Enter your name" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Subject</label>
      <input type="text" placeholder="What is this about?" />
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Write your message here..."></textarea>
    </div>

    <button onclick="submitForm()">Send Message</button>

    <div class="info">
      <p>Email: shopsy@gmail.com</p>
      <p>Phone: +91 9876543210</p>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 Shopsy</p>
  </footer>

  <script>
    function submitForm() {
      alert("Message sent successfully! We'll get back to you soon. ✅");
    }
  </script>

</body>
</html>
